name: Validate redirect target
on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract current redirect target
        id: current
        run: |
          TARGET=$(grep -oP 'url=\K[^"]+' index.html)
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Current redirect: $TARGET"

      - name: Verify redirect page is live
        run: |
          STATUS=$(curl -sI https://terrylica.github.io/ccmax-dashboard/ -o /dev/null -w '%{http_code}')
          echo "Pages HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Verify meta refresh tag exists
        run: |
          BODY=$(curl -s https://terrylica.github.io/ccmax-dashboard/)
          echo "$BODY" | grep -q 'http-equiv="refresh"' || { echo "FAIL: no meta refresh found"; exit 1; }
          echo "PASS: meta refresh tag present"

      - name: Report
        run: |
          echo "Redirect target: ${{ steps.current.outputs.target }}"
          echo "Validation: PASSED"
